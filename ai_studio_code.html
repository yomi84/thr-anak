<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi THR Anak</title>
    <!-- Library Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2ecc71;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        .status {
            text-align: center;
            font-size: 12px;
            margin-bottom: 15px;
            padding: 5px;
            border-radius: 5px;
            background: #eee;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--secondary); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
        }

        th { text-align: left; color: #666; border-bottom: 2px solid #eee; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }

        .total-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .btn-del {
            background: #e74c3c;
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 THR Anak Online</h2>
    <div id="status" class="status">Menghubungkan ke database...</div>

    <div class="form-group">
        <label>Nama Anak</label>
        <input type="text" id="nama" placeholder="Masukkan nama">
    </div>

    <div class="form-group">
        <label>Jumlah THR (Rp)</label>
        <input type="number" id="jumlah" placeholder="Contoh: 50000">
    </div>

    <button id="btnSimpan" onclick="simpan()">Simpan ke Cloud</button>

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Jumlah</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>

    <div class="total-box">
        <span>TOTAL:</span>
        <span id="totalDisplay">Rp 0</span>
    </div>
</div>

<script>
    // KONFIGURASI SUPABASE
    const SB_URL = "https://zfhurwlzlotnywcieyaq.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmaHVyd2x6bG90bnl3Y2lleWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTQ5NjMsImV4cCI6MjA4OTA3MDk2M30.V-K1IRbGMklU30khEohnK4tRwxTd1a-C35Tu9iq_F4k";
    
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    // Ambil data saat halaman dimuat
    muatData();

    async function muatData() {
        updateStatus("Memperbarui daftar...");
        const { data, error } = await _supabase
            .from('thr_anak')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            updateStatus("Error: " + error.message);
        } else {
            render(data);
            updateStatus("Tersinkronisasi dengan Cloud");
        }
    }

    async function simpan() {
        const namaInput = document.getElementById('nama');
        const jumlahInput = document.getElementById('jumlah');
        const btn = document.getElementById('btnSimpan');

        if (!namaInput.value || !jumlahInput.value) {
            alert("Harap isi semua field!");
            return;
        }

        btn.disabled = true;
        updateStatus("Menyimpan...");

        const { error } = await _supabase
            .from('thr_anak')
            .insert([{ 
                nama: namaInput.value, 
                jumlah: parseInt(jumlahInput.value) 
            }]);

        if (error) {
            alert("Gagal simpan: " + error.message);
            updateStatus("Gagal simpan.");
        } else {
            namaInput.value = "";
            jumlahInput.value = "";
            await muatData();
        }
        btn.disabled = false;
    }

    async function hapus(id) {
        if (!confirm("Hapus data ini?")) return;
        
        updateStatus("Menghapus...");
        const { error } = await _supabase
            .from('thr_anak')
            .delete()
            .eq('id', id);

        if (error) alert("Gagal hapus!");
        else muatData();
    }

    function render(data) {
        const body = document.getElementById('listBody');
        let total = 0;
        body.innerHTML = "";

        data.forEach(item => {
            total += item.jumlah;
            body.innerHTML += `
                <tr>
                    <td>${item.nama}</td>
                    <td>Rp ${item.jumlah.toLocaleString('id-ID')}</td>
                    <td><button class="btn-del" onclick="hapus(${item.id})">Hapus</button></td>
                </tr>
            `;
        });

        document.getElementById('totalDisplay').innerText = "Rp " + total.toLocaleString('id-ID');
    }

    function updateStatus(pesan) {
        document.getElementById('status').innerText = pesan;
    }
</script>

</body>
</html>
